# Local development infrastructure for accounting-parser (self-hosted fork).
#
# Phase 1 P1.6 polish: every service has a healthcheck, every secret
# has a dev-only placeholder (installer generates real values), and
# service dependencies use `condition: service_healthy` so a fresh
# `docker compose up -d` waits for prerequisites before the app API
# is reachable.
#
# Port map (host → container):
#   443    Caddy TLS (Phase 2: currently commented; dev traffic goes
#          direct to the app API)
#   5432   Postgres (primary application DB)
#   6379   Redis (Celery broker)
#   4566   LocalStack (parent-spec compat only; removed in Phase 2)
#   9400   Authentik HTTP
#   9443   Authentik HTTPS
#   9900   MinIO S3 API
#   9901   MinIO console
#   3310   ClamAV clamd
#   8000   accounting-parser API
#
# Usage:
#   docker compose up -d
#   docker compose ps
#   curl http://localhost:8000/healthz
#   docker compose down
#   docker compose down -v   # remove volumes (destructive)

services:
  postgres:
    image: postgres:16-alpine
    container_name: accounting-parser-postgres
    environment:
      POSTGRES_USER: accounting_parser
      POSTGRES_PASSWORD: dev_only_password
      POSTGRES_DB: accounting_parser_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U accounting_parser -d accounting_parser_dev",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: accounting-parser-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3
    container_name: accounting-parser-localstack
    environment:
      SERVICES: s3,kms,cognito-idp,sts,iam
      DEBUG: 0
      PERSISTENCE: 1
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---- Authentik identity provider (P1.1) ----

  authentik-postgres:
    image: postgres:16-alpine
    container_name: accounting-parser-authentik-postgres
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: dev_only_authentik_password
      POSTGRES_DB: authentik
    volumes:
      - authentik_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik -d authentik"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  authentik-redis:
    image: redis:7-alpine
    container_name: accounting-parser-authentik-redis
    volumes:
      - authentik_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.10
    container_name: accounting-parser-authentik-server
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: dev-only-secret-key-rotate-in-prod
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: dev_only_authentik_password
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_BOOTSTRAP_EMAIL: admin@accounting-parser.local
      AUTHENTIK_BOOTSTRAP_PASSWORD: dev_only_bootstrap
      AUTHENTIK_BOOTSTRAP_TOKEN: dev_only_bootstrap_token
    ports:
      - "9400:9000"
      - "9443:9443"
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "ak healthcheck",
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.10
    container_name: accounting-parser-authentik-worker
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: dev-only-secret-key-rotate-in-prod
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: dev_only_authentik_password
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy

  # ---- MinIO document storage (P1.2) ----

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: accounting-parser-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio-dev-only
      MINIO_REGION: us-east-1
    ports:
      # Host 9900/9901 to avoid collision with Authentik's 9000.
      # Container ports stay at MinIO defaults (9000 S3 API, 9001 console).
      - "9900:9000"
      - "9901:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  minio-bucket-init:
    # One-shot sidecar that creates the app bucket on first boot so
    # the app doesn't have to do it at startup. Idempotent: succeeds
    # immediately if the bucket already exists.
    image: minio/mc:RELEASE.2024-10-02T08-27-28Z
    container_name: accounting-parser-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio-dev-only &&
      mc mb --ignore-existing local/accounting-parser &&
      echo 'bucket ready'
      "
    restart: "no"

  # ---- ClamAV virus scanner (P1.2) ----

  clamav:
    image: clamav/clamav:1.4
    container_name: accounting-parser-clamav
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"
      CLAMAV_NO_CLAMD: "false"
      CLAMD_STARTUP_TIMEOUT: "300"
    ports:
      - "3310:3310"
    volumes:
      - clamav_db:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s

  # ---- accounting-parser API (P1.6 addition) ----
  #
  # Builds the backend image from backend/ and starts uvicorn on :8000.
  # Depends on every service it needs to function — compose waits for
  # health before starting this container, so the first request after
  # `docker compose up -d` hits a fully-initialized system.
  #
  # Secrets here are DEV-ONLY. Real installs get generated values
  # through the installer's sealed secrets bundle (P3.1).

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: accounting-parser-app
    environment:
      ACCOUNTING_PARSER_DB_URL: postgresql+psycopg://app_user:app_user@postgres:5432/accounting_parser_dev
      ACCOUNTING_PARSER_AUTH_ADAPTER: authentik
      ACCOUNTING_PARSER_AUTHENTIK_BASE_URL: http://authentik-server:9000
      ACCOUNTING_PARSER_AUTHENTIK_CLIENT_ID: accounting-parser
      ACCOUNTING_PARSER_AUTHENTIK_API_TOKEN: dev_only_bootstrap_token
      ACCOUNTING_PARSER_AUTHENTIK_JWKS_URL: http://authentik-server:9000/application/o/accounting-parser/jwks/
      ACCOUNTING_PARSER_AUTHENTIK_AUDIENCE: accounting-parser
      ACCOUNTING_PARSER_AUTHENTIK_ISSUER: http://authentik-server:9000/application/o/accounting-parser/
      ACCOUNTING_PARSER_DOC_STORE_ADAPTER: minio
      ACCOUNTING_PARSER_MINIO_ENDPOINT_URL: http://minio:9000
      ACCOUNTING_PARSER_MINIO_ACCESS_KEY: minio
      ACCOUNTING_PARSER_MINIO_SECRET_KEY: minio-dev-only
      ACCOUNTING_PARSER_STORAGE_BUCKET: accounting-parser
      ACCOUNTING_PARSER_VIRUS_SCANNER: clamd
      ACCOUNTING_PARSER_CLAMD_HOST: clamav
      ACCOUNTING_PARSER_CLAMD_PORT: "3310"
      ACCOUNTING_PARSER_FIRM_RP_ID: localhost
      ACCOUNTING_PARSER_FIRM_RP_NAME: "Development Firm"
      # Dev session key: an Ed25519-equivalent RSA-2048 pair would be
      # generated by the installer in production. Unset in compose so
      # the app refuses to start unless explicitly provided — prevents
      # accidentally shipping compose with a default signing key.
      # Set via .env or docker compose override for local dev.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bucket-init:
        condition: service_completed_successfully
      authentik-server:
        condition: service_healthy
      clamav:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  localstack_data:
  authentik_postgres_data:
  authentik_redis_data:
  minio_data:
  clamav_db:
