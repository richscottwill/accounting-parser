# Local development infrastructure for accounting-parser (self-hosted fork).
#
# Brings up:
#   - Postgres 16   — primary application database
#   - Redis 7       — Celery broker + cache
#   - LocalStack    — legacy parent-spec S3/KMS/Cognito emulation (retained
#                     so parent-spec tests continue to pass; the self-hosted
#                     fork's own adapters supersede these)
#   - Authentik     — self-hosted IdP (Phase 1 P1.1). Requires its own
#                     Postgres + Redis; sharing the app's stack would
#                     couple Authentik's lifecycle to application data
#                     which is an anti-pattern.
#
# Usage:
#   docker compose up -d
#   docker compose ps
#   docker compose logs -f authentik-server
#   docker compose down
#   docker compose down -v   # remove volumes (destructive)

services:
  postgres:
    image: postgres:16-alpine
    container_name: accounting-parser-postgres
    environment:
      POSTGRES_USER: accounting_parser
      POSTGRES_PASSWORD: dev_only_password
      POSTGRES_DB: accounting_parser_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounting_parser -d accounting_parser_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: accounting-parser-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    container_name: accounting-parser-localstack
    environment:
      SERVICES: s3,kms,cognito-idp,sts,iam
      DEBUG: 0
      PERSISTENCE: 1
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Authentik identity provider (self-hosted fork, Phase 1 P1.1) ----

  authentik-postgres:
    image: postgres:16-alpine
    container_name: accounting-parser-authentik-postgres
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: dev_only_authentik_password
      POSTGRES_DB: authentik
    volumes:
      - authentik_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik -d authentik"]
      interval: 5s
      timeout: 5s
      retries: 10

  authentik-redis:
    image: redis:7-alpine
    container_name: accounting-parser-authentik-redis
    volumes:
      - authentik_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.10
    container_name: accounting-parser-authentik-server
    command: server
    environment:
      # Dev-only secret. Real installs generate this in the installer
      # (P3.1) and store the sealed copy in the secrets vault (P1.3).
      AUTHENTIK_SECRET_KEY: dev-only-secret-key-rotate-in-prod
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: dev_only_authentik_password
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      # Bootstrap an initial admin user + API token for the installer
      # to consume. In production the installer rotates this after
      # first login.
      AUTHENTIK_BOOTSTRAP_EMAIL: admin@accounting-parser.local
      AUTHENTIK_BOOTSTRAP_PASSWORD: dev_only_bootstrap
      AUTHENTIK_BOOTSTRAP_TOKEN: dev_only_bootstrap_token
    ports:
      # Host only; Caddy will proxy in production. For dev we expose
      # 9443 (HTTPS) directly.
      - "9000:9000"
      - "9443:9443"
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9000/-/health/live/"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.10
    container_name: accounting-parser-authentik-worker
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: dev-only-secret-key-rotate-in-prod
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: dev_only_authentik_password
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    # Worker health is observable via the server's metrics; no direct
    # healthcheck here because the worker exposes no HTTP port.

  # ---- MinIO document storage (self-hosted fork, Phase 1 P1.2) ----

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: accounting-parser-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio-dev-only
      MINIO_REGION: us-east-1
    ports:
      # 9000 = S3 API (internal). 9001 = web console (dev-only).
      # Host-exposed for developer convenience; in production Caddy
      # never proxies MinIO externally — only the app API does.
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- ClamAV virus scanner (self-hosted fork, Phase 1 P1.2) ----

  clamav:
    image: clamav/clamav:1.4
    container_name: accounting-parser-clamav
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"
      CLAMAV_NO_CLAMD: "false"
      # First startup downloads definitions (~150 MB). Post-startup
      # the freshclam sidecar refreshes them every 4 hours.
      CLAMD_STARTUP_TIMEOUT: "300"
    ports:
      # 3310 internal only; exposed for dev inspection + test clients.
      - "3310:3310"
    volumes:
      - clamav_db:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      # Definitions download is slow on first boot; forgive up to
      # 5 minutes before healthcheck starts counting.
      start_period: 300s

volumes:
  postgres_data:
  localstack_data:
  authentik_postgres_data:
  authentik_redis_data:
  minio_data:
  clamav_db:
